<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      href="/favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicon/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="Ogr!" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <meta
      name="description"
      content="Ogr! – dwujęzyczna (PL/EN) pikselowa gra paragrafowa. Wciel się w bohatera, podejmuj decyzje i odkrywaj rozgałęzioną historię w retro stylu."
    />
    <!-- Wczesne pobranie czcionki tekstu (body) — skraca ścieżkę krytyczną i przyspiesza FCP -->
    <link
      rel="preload"
      href="/fonts/DepartureMono.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <!-- Wczesne pobranie obrazu LCP (domyślny, jasny motyw), aby przyspieszyć renderowanie -->
    <link
      rel="preload"
      as="image"
      href="/ogre-light.webp"
      fetchpriority="high"
    />
    <title>Ogr!</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
